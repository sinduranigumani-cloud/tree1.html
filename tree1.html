<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Stack Project Tree</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
    }
    .tree {
        list-style-type: none;
        padding-left: 20px;
    }
    .tree li {
        position: relative;
        margin: 4px 0;
        cursor: pointer;
    }
    .tree li::before {
        content: "";
        position: absolute;
        top: 12px;
        left: -12px;
        border-left: 1px solid #888;
        border-bottom: 1px solid #888;
        width: 12px;
        height: 12px;
    }
    .folder::before {
        content: "📁 ";
    }
    .file::before {
        content: "📄 ";
    }
    .nested {
        display: none;
        margin-left: 20px;
    }
    .active {
        display: block;
    }
</style>
</head>
<body>

<h2>Full Stack Project Structure</h2>

<ul class="tree">
    <li class="folder">project-root
        <ul class="nested">
            <li class="folder">frontend
                <ul class="nested">
                    <li class="file">index.html</li>
                    <li class="file">style.css</li>
                    <li class="file">app.js</li>
                </ul>
            </li>
            <li class="folder">backend
                <ul class="nested">
                    <li class="file">server.js</li>
                    <li class="folder">routes
                        <ul class="nested">
                            <li class="file">api.js</li>
                        </ul>
                    </li>
                    <li class="folder">models
                        <ul class="nested">
                            <li class="file">userModel.js</li>
                        </ul>
                    </li>
                </ul>
            </li>
            <li class="folder">config
                <ul class="nested">
                    <li class="file">db.js</li>
                </ul>
            </li>
            <li class="file">package.json</li>
            <li class="file">README.md</li>
        </ul>
    </li>
</ul>

<script>
    // Toggle folder open/close
    document.querySelectorAll(".folder").forEach(folder => {
        folder.addEventListener("click", function(e) {
            e.stopPropagation(); // Prevent event bubbling
            let nested = this.querySelector(".nested");
            if (nested) {
                nested.classList.toggle("active");
            }
        });
    });
</script>

</body>
</html>
